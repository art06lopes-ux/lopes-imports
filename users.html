<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerenciar Usuários - Gerenciamento de Vendas</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .users-card { max-width:900px; margin:32px auto; padding:20px; }
    .user-row { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:10px; border-radius:8px; }
    .user-actions { display:flex; gap:8px; }
    .invite-area { margin-top:16px; display:grid; gap:8px; }
    .invite-output { width:100%; min-height:80px; padding:8px; border-radius:8px; background:var(--input-bg); border:1px solid var(--border-color); color:var(--text-primary); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h1>🛡️ Painel de Usuários</h1>
          <p class="subtitle">Gerencie contas (apenas admins)</p>
        </div>
        <div>
          <button id="backBtn" class="btn">Voltar</button>
          <button id="logoutBtn" class="btn" style="background:#b22222;">Sair</button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="card users-card">
        <h2>Usuários</h2>
        <div id="usersContainer" style="margin-top:12px; display:grid; gap:8px;"></div>

        <div style="margin-top:16px;">
          <h3>Registrar novo usuário</h3>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <input id="newUsername" placeholder="Usuário" />
            <input id="newEmail" placeholder="Email (opcional)" />
            <input id="newPassword" type="password" placeholder="Senha" />
            <button id="createUserBtn" class="btn btn-primary">Criar</button>
          </div>
        </div>

        <div class="invite-area">
          <h3>Gerar convite (cria usuário e gera credenciais prontas)</h3>
          <div style="display:flex; gap:8px;">
            <input id="inviteUsername" placeholder="Usuário (opcional)" />
            <input id="inviteEmail" placeholder="Email (opcional)" />
            <button id="generateInviteBtn" class="btn">Gerar Convite</button>
          </div>
          <textarea id="inviteOutput" class="invite-output" readonly placeholder="Aqui aparecerá o texto do convite..."></textarea>
          <div style="display:flex; gap:8px;">
            <button id="copyInviteBtn" class="btn">Copiar Convite</button>
            <button id="createFromInviteBtn" class="btn btn-primary">Criar usuário (sem copiar)</button>
          </div>
        </div>

      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Gerenciamento de Vendas</p>
    </footer>
  </div>

  <script src="users.js"></script>
</body>
</html>
