<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Gerenciar Usuários</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border-color); }
    .admin-title { display: flex; align-items: center; gap: 12px; }
    .admin-title h1 { margin: 0; font-size: 28px; }
    .admin-actions { display: flex; gap: 12px; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
    .card h2 { margin-top: 0; color: var(--text-primary); font-size: 18px; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(100, 150, 255, 0.1); }
    .btn { padding: 10px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-secondary { background: var(--border-color); color: var(--text-primary); }
    .btn-danger { background: #dc3545; }
    .btn-success { background: #28a745; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .users-list { grid-column: 1 / -1; }
    .user-item { background: var(--bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .user-details { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
    .user-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .invite-section { grid-column: 1 / -1; }
    .invite-box { background: var(--bg); border: 1px solid var(--accent); border-radius: 8px; padding: 12px; margin-bottom: 12px; font-family: 'Courier New', monospace; font-size: 13px; color: var(--text-primary); max-height: 150px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .status-admin { background: rgba(100, 150, 255, 0.2); color: var(--accent); }
    .status-user { background: rgba(40, 167, 69, 0.2); color: #28a745; }
    .loading { text-align: center; padding: 20px; color: var(--text-secondary); }
    .error { background: rgba(220, 53, 69, 0.1); border: 1px solid #dc3545; color: #dc3545; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    .success { background: rgba(40, 167, 69, 0.1); border: 1px solid #28a745; color: #28a745; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    @media (max-width: 768px) {
      .admin-grid { grid-template-columns: 1fr; }
      .user-item { flex-direction: column; align-items: flex-start; }
      .user-actions { width: 100%; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div class="admin-title">
        <span>👨‍💼</span>
        <div>
          <h1>Painel de Administração</h1>
          <p style="margin: 0; font-size: 14px; color: var(--text-secondary);">Gerenciar usuários e membros</p>
        </div>
      </div>
      <div class="admin-actions">
        <button id="refreshBtn" class="btn btn-secondary btn-small">🔄 Atualizar</button>
        <button id="logoutBtn" class="btn btn-danger btn-small">Sair</button>
      </div>
    </div>

    <div id="alertContainer"></div>

    <div class="admin-grid">
      <!-- Criar novo usuário -->
      <div class="card">
        <h2>➕ Criar Novo Usuário</h2>
        <div class="form-group">
          <label>Nome de usuário (login)</label>
          <input type="text" id="newUsername" placeholder="Ex: joao.silva">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="newEmail" placeholder="Ex: joao@example.com">
        </div>
        <div class="form-group">
          <label>Função</label>
          <select id="newRole">
            <option value="user">Membro</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="form-group">
          <label>Senha (deixe em branco para gerar automaticamente)</label>
          <input type="password" id="newPassword" placeholder="Deixe vazio para gerar">
        </div>
        <button id="createUserBtn" class="btn btn-success" style="width: 100%;">Criar Usuário</button>
      </div>

      <!-- Gerar Convite -->
      <div class="card invite-section">
        <h2>✉️ Gerar Convite Personalizado</h2>
        <div class="form-group">
          <label>Nome do usuário (opcional)</label>
          <input type="text" id="inviteUsername" placeholder="Ex: maria.oliveira">
        </div>
        <div class="form-group">
          <label>Email (opcional)</label>
          <input type="email" id="inviteEmail" placeholder="Ex: maria@example.com">
        </div>
        <button id="generateInviteBtn" class="btn btn-success" style="width: 100%;">Gerar Convite</button>
        
        <div id="inviteContainer" style="margin-top: 12px; display: none;">
          <label style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Texto do convite:</label>
          <div class="invite-box" id="inviteBox"></div>
          <button id="copyInviteBtn" class="btn btn-success btn-small" style="width: 100%; margin-top: 12px;">📋 Copiar Convite</button>
        </div>
      </div>

      <!-- Lista de usuários -->
      <div class="card users-list">
        <h2>👥 Usuários Cadastrados (<span id="userCount">0</span>)</h2>
        <div id="usersContainer" class="loading">Carregando usuários...</div>
      </div>
    </div>
  </div>

  <script type="module" src="admin-users.js"></script>
</body>
</html>
