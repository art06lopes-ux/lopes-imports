<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Migração para Firebase - Gerenciamento de Vendas</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .migration-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 40px;
      text-align: center;
    }

    .migration-card {
      background: var(--input-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 20px;
    }

    .migration-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .migration-description {
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .migration-status {
      background: var(--bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      min-height: 200px;
      text-align: left;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--text-primary);
      overflow-y: auto;
      max-height: 300px;
    }

    .log-line {
      margin-bottom: 8px;
      padding: 4px;
    }

    .log-success { color: #28a745; }
    .log-error { color: #dc3545; }
    .log-info { color: var(--text-secondary); }

    .btn {
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s;
      margin: 8px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: #28a745; }
    .btn-secondary { background: var(--border-color); color: var(--text-primary); }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px;
    }

    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 600; color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="migration-container">
    <div class="migration-card">
      <div class="migration-title">🚀 Migração para Firebase</div>
      <div class="migration-description">
        Seus usuários estão sendo migrados do armazenamento local para a nuvem Firebase.
        Este processo é seguro e não apagará nenhum dado.
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Usuários encontrados</div>
          <div class="stat-value" id="foundCount">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Migrados com sucesso</div>
          <div class="stat-value" id="successCount">0</div>
        </div>
      </div>

      <div class="migration-status" id="statusLog"></div>

      <button id="startBtn" class="btn btn-success">Iniciar Migração</button>
      <button id="skipBtn" class="btn btn-secondary">Pular (não recomendado)</button>
    </div>

    <div id="completeCard" style="display: none;">
      <div class="migration-card">
        <div class="migration-title">✅ Migração Concluída!</div>
        <div class="migration-description" id="completeMessage"></div>
        <button id="continueBtn" class="btn btn-success">Continuar para Login</button>
      </div>
    </div>
  </div>

  <script type="module" src="migration.js"></script>
</body>
</html>
