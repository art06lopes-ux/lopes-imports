<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - Verificar Dados</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    pre { background: #2a2a2a; padding: 15px; border-radius: 8px; overflow-x: auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
    .success { color: #4caf50; }
    .error { color: #f44336; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Debug do Sistema</h1>
    
    <h2>1. Dados no LocalStorage</h2>
    <pre id="storage"></pre>
    
    <h2>2. Testar Hash da Senha</h2>
    <input type="text" id="testPassword" placeholder="Digite a senha para testar" value="1327">
    <button onclick="testHash()">Gerar Hash</button>
    <pre id="hashResult"></pre>
    
    <h2>3. Ações</h2>
    <button onclick="clearStorage()">Limpar LocalStorage</button>
    <button onclick="createAdminManually()">Criar Admin Manualmente</button>
    <button onclick="testLogin()">Testar Login (donolopes/1327)</button>
    <pre id="result"></pre>
  </div>

  <script src="login.js"></script>
  <script>
    async function hashPassword(password) {
      const enc = new TextEncoder();
      const data = enc.encode(password);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function displayStorage() {
      const users = JSON.parse(localStorage.getItem('lopes_v7_users') || '[]');
      const session = JSON.parse(localStorage.getItem('lopes_v7_session') || 'null');
      document.getElementById('storage').textContent = JSON.stringify({ users, session }, null, 2);
    }

    async function testHash() {
      const pwd = document.getElementById('testPassword').value;
      const hash = await hashPassword(pwd);
      document.getElementById('hashResult').textContent = `Senha: ${pwd}\nHash: ${hash}`;
      displayStorage();
    }

    function clearStorage() {
      localStorage.removeItem('lopes_v7_users');
      localStorage.removeItem('lopes_v7_session');
      document.getElementById('result').textContent = '✓ LocalStorage limpo!';
      displayStorage();
    }

    async function createAdminManually() {
      const hash = await hashPassword('1327');
      const users = [{ username: 'donolopes', email: 'admin@local', passwordHash: hash, role: 'admin', createdAt: new Date().toISOString() }];
      localStorage.setItem('lopes_v7_users', JSON.stringify(users));
      document.getElementById('result').textContent = '✓ Admin criado manualmente!';
      displayStorage();
    }

    async function testLogin() {
      const res = await login('donolopes', '1327');
      document.getElementById('result').textContent = JSON.stringify(res, null, 2);
      displayStorage();
    }

    // Load initial storage display
    displayStorage();
  </script>
</body>
</html>
