<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resetar Login - Lopes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { 
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .section {
      margin-bottom: 20px;
    }
    .label {
      font-size: 12px;
      font-weight: 600;
      color: #667eea;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .data-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 8px;
      min-height: 40px;
      display: flex;
      align-items: center;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:active {
      transform: scale(0.98);
      background: #5568d3;
    }
    .btn-success {
      background: #4caf50;
      color: white;
    }
    .btn-success:active {
      transform: scale(0.98);
      background: #45a049;
    }
    .btn-danger {
      background: #f44336;
      color: white;
    }
    .btn-danger:active {
      transform: scale(0.98);
      background: #da190b;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
    .info-text {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #1565c0;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 Resetar Login</h1>
    <p class="subtitle">Configure suas credenciais de acesso</p>
    
    <div id="message" class="message"></div>

    <div class="section">
      <div class="label">Status do Sistema</div>
      <div class="data-box" id="status">Verificando...</div>
    </div>

    <div class="section">
      <div class="label">Credenciais Padrão</div>
      <div class="data-box">Usuário: <strong>donolopes</strong></div>
      <div class="data-box">Senha: <strong>1327</strong></div>
    </div>

    <button class="btn-success" onclick="criarAdmin()">✓ Criar Admin Agora</button>
    <button class="btn-primary" onclick="testarLogin()">🔍 Testar Login</button>
    <button class="btn-danger" onclick="limpar()">🗑️ Limpar Dados</button>

    <div class="info-text">
      <strong>ℹ️ Como funciona:</strong><br>
      1. Clique em "Criar Admin Agora"<br>
      2. Clique em "Testar Login"<br>
      3. Se aparecer ✓, vá para o login.html
    </div>
  </div>

  <script src="login.js"></script>
  <script>
    async function hashPassword(password) {
      const enc = new TextEncoder();
      const data = enc.encode(password);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
      setTimeout(() => { el.className = 'message'; }, 5000);
    }

    function updateStatus() {
      const users = JSON.parse(localStorage.getItem('lopes_v7_users') || '[]');
      const session = JSON.parse(localStorage.getItem('lopes_v7_session') || 'null');
      const statusEl = document.getElementById('status');
      if (users.length > 0) {
        statusEl.innerHTML = `✓ ${users.length} usuário(s) cadastrado(s)`;
      } else {
        statusEl.innerHTML = '⚠️ Nenhum usuário cadastrado';
      }
    }

    async function criarAdmin() {
      try {
        const hash = await hashPassword('1327');
        const users = [{ 
          username: 'donolopes', 
          email: 'admin@local', 
          passwordHash: hash, 
          role: 'admin', 
          createdAt: new Date().toISOString() 
        }];
        localStorage.setItem('lopes_v7_users', JSON.stringify(users));
        showMessage('✓ Admin criado com sucesso!', 'success');
        updateStatus();
      } catch (e) {
        showMessage('❌ Erro ao criar admin: ' + e.message, 'error');
      }
    }

    async function testarLogin() {
      try {
        const users = JSON.parse(localStorage.getItem('lopes_v7_users') || '[]');
        const user = users.find(u => u.username === 'donolopes');
        
        if (!user) {
          showMessage('❌ Usuário não encontrado. Clique em "Criar Admin Agora" primeiro.', 'error');
          return;
        }

        const hash = await hashPassword('1327');
        if (hash === user.passwordHash) {
          const session = { 
            username: 'donolopes', 
            token: Math.random().toString(36).slice(2), 
            createdAt: new Date().toISOString() 
          };
          localStorage.setItem('lopes_v7_session', JSON.stringify(session));
          showMessage('✓ Login funcionando! Redirecionando...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showMessage('❌ Erro ao validar senha', 'error');
        }
      } catch (e) {
        showMessage('❌ Erro: ' + e.message, 'error');
      }
    }

    function limpar() {
      if (confirm('Tem certeza que deseja limpar todos os dados?')) {
        localStorage.removeItem('lopes_v7_users');
        localStorage.removeItem('lopes_v7_session');
        showMessage('✓ Dados limpos!', 'success');
        updateStatus();
      }
    }

    updateStatus();
  </script>
</body>
</html>
