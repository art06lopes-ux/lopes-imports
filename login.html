<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Gerenciamento de Vendas</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-card { max-width:420px; margin:48px auto; padding:24px; border-radius:12px; }
    .login-actions { display:flex; gap:8px; margin-top:12px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card login-card">
      <h2>🔒 Entrar / Registrar</h2>
      <div style="margin-top:12px;">
        <input id="username" type="text" placeholder="Usuário" />
      </div>
      <div style="margin-top:8px;">
        <input id="email" type="email" placeholder="Email (opcional)" />
      </div>
      <div style="margin-top:8px;">
        <input id="password" type="password" placeholder="Senha" />
      </div>
      <div class="login-actions">
        <button id="btnLogin" class="btn btn-primary">Entrar</button>
        <button id="btnRegister" class="btn">Registrar</button>
      </div>
      <p style="color:var(--text-secondary); margin-top:12px;">Caso seja a primeira vez, use "Registrar". Um usuário padrão <strong>admin / admin123</strong> é criado automaticamente se não houver usuários.</p>
    </section>
  </div>

  <script src="login.js"></script>
</body>
</html>
