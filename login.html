<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gerenciamento de Vendas - Sistema de Gestão de Vendas">
  <meta name="author" content="Gerenciamento de Vendas">
  <title>Gerenciamento de Vendas - Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-card { max-width:420px; margin:48px auto; padding:24px; border-radius:12px; }
    .login-actions { display:flex; gap:8px; margin-top:12px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card login-card">
      <h2>🔒 Entrar</h2>
      <div style="margin-top:12px;">
        <input id="username" type="text" placeholder="Usuário" autofocus />
      </div>
      <div style="margin-top:8px;">
        <input id="password" type="password" placeholder="Senha" />
      </div>
      <div class="login-actions">
        <button id="btnLogin" class="btn btn-primary">Entrar</button>
      </div>
      <p style="color:var(--text-secondary); margin-top:12px;">A criação de usuários é gerenciada pelo administrador. Caso precise de acesso, solicite suas credenciais ao administrador.</p>
    </section>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
